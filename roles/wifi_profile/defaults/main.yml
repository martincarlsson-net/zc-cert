---
# wifi_ssid and wifi_con_name are provided via group_vars/all/vault.yml.

# 802.1X/EAP-TLS material — paths must match where certmonger stored them
# (set by the scep_enroll role).
wifi_client_cert: "/etc/pki/tls/certs/scep-wifi.crt"
wifi_private_key: "/etc/pki/tls/private/scep-wifi.key"

# CA used to validate the RADIUS/EAP server certificate the AP presents.
# The FortiAuthenticator EAP server cert (CN=fac.zitac.net) is signed by the
# INTERNAL zitac_fortiauth_root CA — not the Carasent PKI that issues client
# certs. Confirmed from the wpa_supplicant handshake (server chain
# fac.zitac.net -> zitac_fortiauth_root). Shipped with the role.
wifi_eap_server_ca_file: "zitac_fortiauth_root.crt"
wifi_ca_cert: "/etc/pki/ca-trust/source/anchors/zitac_fortiauth_root.crt"

# EAP-TLS outer identity sent to the RADIUS server. Matches the enrolled cert CN.
wifi_identity: "{{ ansible_facts['hostname'] }}-{{ ansible_facts['machine_id'][-6:] }}"

# WPA-Enterprise key management.
wifi_key_mgmt: "wpa-eap"

# Timeouts and paths — tune via group_vars/all/vars.yml.
wifi_connect_timeout: 30     # seconds to wait for the cert connection to activate
wifi_failsafe_delay: 120     # seconds until the failsafe forces fallback Wi-Fi back
wifi_pmf: 2

# Internet reachability check after associating to the cert SSID. If the ping
# fails the host falls back to the previous Wi-Fi; if it succeeds it stays.
wifi_ping_target: "8.8.8.8"
wifi_ping_count: 3
# How long (in 2s steps) to wait for internet to recover on the fallback link.
wifi_internet_restore_wait: 30

# Telegram notification is sent via the shared sender ({{ telegram_send_script }},
# deployed by the telegram role). Credentials and tunables are global — see
# group_vars/all/vars.yml and the vault.

wifi_test_script: "/usr/local/sbin/wifi-cert-test.sh"
wifi_failsafe_script: "/usr/local/sbin/wifi-cert-failsafe.sh"
wifi_test_log: "/var/log/wifi-cert-test.log"
wifi_test_status: "/var/log/wifi-cert-test.status"
