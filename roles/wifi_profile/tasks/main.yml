---
# wifi_profile role
# Deploys an 802.1X/EAP-TLS NetworkManager profile for the cert SSID using the
# certificate enrolled by scep_enroll, then tests it:
#   - associate (up to wifi_connect_timeout seconds)
#   - if associated, ping wifi_ping_target to confirm internet
#   - ping OK  -> STAY on the cert network
#   - ping bad or never associated -> fall back to the previous Wi-Fi
# A Telegram summary is sent at the end (credentials from the vault).
# The test runs DETACHED because switching Wi-Fi on the same radio drops the
# fallback link (and any SSH session); a failsafe restores the fallback Wi-Fi
# unless the test deliberately stayed on the cert network.

- name: Ensure NetworkManager is installed
  package:
    name: NetworkManager
    state: present

- name: Ensure NetworkManager is running and enabled
  service:
    name: NetworkManager
    state: started
    enabled: true

# --- Prerequisites --------------------------------------------------------
- name: Confirm the enrolled certificate and key are present
  stat:
    path: "{{ item }}"
  register: wifi_cert_files
  loop:
    - "{{ wifi_client_cert }}"
    - "{{ wifi_private_key }}"

- name: Fail if the certificate or key is missing (run scep_enroll first)
  assert:
    that: wifi_cert_files.results | map(attribute='stat.exists') | list is all
    fail_msg: >-
      Missing {{ wifi_client_cert }} or {{ wifi_private_key }}.
      The scep_enroll role must run successfully before deploying the Wi-Fi profile.

# The RADIUS server presents a TLS certificate during EAP-TLS. The client must
# trust the CA that signed it; that CA is shipped as eap_server_ca.crt.
- name: Deploy the EAP server CA to the system trust anchors
  copy:
    src: "{{ wifi_eap_server_ca_file }}"
    dest: "{{ wifi_ca_cert }}"
    owner: root
    group: root
    mode: "0644"
  register: wifi_eap_ca_deploy

- name: Rebuild the system trust store if the EAP server CA changed
  command: update-ca-trust
  when: wifi_eap_ca_deploy is changed
  changed_when: true

# --- Identify the management Wi-Fi (so we can restore it after the test) ---
- name: Detect the currently active Wi-Fi connection (our management link)
  shell: >-
    nmcli -t -f NAME,TYPE,DEVICE connection show --active
    | awk -F: '$2 == "802-11-wireless" {print $1; exit}'
  register: wifi_mgmt_detect
  changed_when: false

- name: Record the management Wi-Fi connection name
  set_fact:
    wifi_mgmt_con: "{{ wifi_mgmt_detect.stdout | trim }}"

# Scan for the target SSID. If it is not visible we are in remote-enrollment
# mode: install the cert + profile but skip the connection test and rollback.
- name: Scan for the target SSID in the current environment
  command: nmcli --fields SSID dev wifi list
  register: wifi_ssid_scan
  changed_when: false
  failed_when: false

- name: Determine whether the target SSID is currently visible
  set_fact:
    wifi_ssid_visible: "{{ wifi_ssid in wifi_ssid_scan.stdout }}"

- name: Report SSID visibility
  debug:
    msg: "{{ wifi_ssid }} is {{ 'visible — running connection test' if wifi_ssid_visible else 'NOT visible — remote enrollment mode, skipping test' }}"

- name: Fail if no active management Wi-Fi was found
  assert:
    that: wifi_mgmt_con | length > 0
    fail_msg: >-
      Could not determine the active Wi-Fi connection to restore after testing.
      Refusing to proceed — would risk stranding the host off the network.
  when: wifi_ssid_visible

- name: Report the management Wi-Fi that will be restored after the test
  debug:
    msg: "Management Wi-Fi to restore after the cert test: '{{ wifi_mgmt_con }}'"
  when: wifi_ssid_visible

# --- Build the EAP-TLS profile --------------------------------------------
# Recreate from scratch each run for a deterministic, idempotent result.
- name: Remove any pre-existing cert Wi-Fi profile
  command: nmcli connection delete "{{ wifi_con_name }}"
  register: wifi_profile_delete
  changed_when: "'successfully deleted' in wifi_profile_delete.stdout"
  failed_when: false

- name: Create the 802.1X/EAP-TLS Wi-Fi profile for the cert SSID
  command: >
    nmcli connection add type wifi
    con-name "{{ wifi_con_name }}"
    ssid "{{ wifi_ssid }}"
    connection.autoconnect no
    wifi-sec.key-mgmt "{{ wifi_key_mgmt }}"
    wifi-sec.pmf {{ wifi_pmf }}
    802-1x.eap tls
    802-1x.identity "{{ wifi_identity }}"
    802-1x.client-cert "{{ wifi_client_cert }}"
    802-1x.private-key "{{ wifi_private_key }}"
    802-1x.private-key-password-flags 4
    802-1x.ca-cert "{{ wifi_ca_cert }}"
  register: wifi_profile_add
  changed_when: true

# --- Validate the profile was created -------------------------------------
- name: Validate the cert Wi-Fi profile exists and is well-formed
  command: nmcli -t -f 802-1x.eap,802-1x.client-cert connection show "{{ wifi_con_name }}"
  register: wifi_profile_check
  changed_when: false

- name: Confirm the profile uses EAP-TLS with the enrolled certificate
  assert:
    that:
      - "'tls' in wifi_profile_check.stdout"
      - "wifi_client_cert in wifi_profile_check.stdout"
    fail_msg: "The cert Wi-Fi profile was not created correctly: {{ wifi_profile_check.stdout }}"

# Ensure the test log exists with restricted permissions before any script writes
# to it. Default umask would create it 0644, exposing connection details.
- name: Ensure the connection-test log file exists with restricted permissions
  file:
    path: "{{ wifi_test_log }}"
    state: touch
    owner: root
    group: root
    mode: "0600"
    modification_time: preserve
    access_time: preserve

# --- Deploy the detached test + failsafe scripts --------------------------
- name: Deploy the detached connection-test script
  template:
    src: wifi-cert-test.sh.j2
    dest: "{{ wifi_test_script }}"
    owner: root
    group: root
    mode: "0755"

- name: Deploy the management-Wi-Fi failsafe script
  template:
    src: wifi-cert-failsafe.sh.j2
    dest: "{{ wifi_failsafe_script }}"
    owner: root
    group: root
    mode: "0755"

- name: Reset the previous test status marker (in-office)
  copy:
    dest: "{{ wifi_test_status }}"
    content: "PENDING\n"
    owner: root
    group: root
    mode: "0644"
  when: wifi_ssid_visible

- name: Mark as remote enrollment — no test will run (SSID not in range)
  copy:
    dest: "{{ wifi_test_status }}"
    content: "REMOTE\n"
    owner: root
    group: root
    mode: "0644"
  when: not wifi_ssid_visible

# --- Run the test detached, then recover the SSH connection ---------------
# Stop any leftover units from a previous run before starting new ones.
# Without this, systemd-run fails if the unit name already exists.
- name: Stop any leftover test or failsafe units from a previous run
  command: systemctl stop wifi-cert-test.service wifi-cert-failsafe.service wifi-cert-failsafe.timer
  failed_when: false
  changed_when: false
  when: wifi_ssid_visible

# Failsafe first: force the management Wi-Fi back after wifi_failsafe_delay,
# independent of the test, so the host can never be left stranded.
- name: Schedule the management-Wi-Fi failsafe (transient systemd timer)
  command: >
    systemd-run --collect
    --on-active={{ wifi_failsafe_delay }}
    --unit=wifi-cert-failsafe
    {{ wifi_failsafe_script }}
  changed_when: true
  when: wifi_ssid_visible

# The test itself runs as a transient unit so it survives the SSH drop caused
# by switching Wi-Fi networks.
- name: Launch the detached cert connection test
  command: >
    systemd-run --collect
    --unit=wifi-cert-test
    {{ wifi_test_script }}
  changed_when: true
  when: wifi_ssid_visible

# The detached test runs asynchronously and may move us onto the cert network;
# poll its status file (connection-agnostic) until it reaches a terminal state.
# SUCCESS = staying on cert, FALLBACK/FAIL = rolled back to the fallback Wi-Fi.
- name: Wait for the detached connection test to finish
  command: "cat {{ wifi_test_status }}"
  register: wifi_test_result
  until: wifi_test_result.stdout is not search('PENDING')
  retries: 40
  delay: 5
  changed_when: false
  when: wifi_ssid_visible

- name: Read the connection-test log
  command: "cat {{ wifi_test_log }}"
  register: wifi_test_logout
  changed_when: false
  when: wifi_ssid_visible

- name: Show the connection-test log
  debug:
    msg: "{{ wifi_test_logout.stdout_lines }}"
  when: wifi_ssid_visible

- name: Report the connection-test outcome
  debug:
    msg: >-
      Cert Wi-Fi connection test result: {{ wifi_test_result.stdout | trim }}.
      {% if wifi_test_result.stdout is search('SUCCESS') %}Connected to the cert SSID with internet — staying on it.{% else %}The profile was rolled back and the host fell back to the previous Wi-Fi.{% endif %}
      A Telegram summary was sent.
  when: wifi_ssid_visible

# --- Remote enrollment notification (SSID not in range) -------------------
- name: Send Telegram notification for remote enrollment
  command:
    argv:
      - "{{ telegram_send_script }}"
      - |-
        📶 <b>Cert Wi-Fi profile installed (remote)</b>
        🖥 Host: <code>{{ ansible_facts['hostname'] }}</code>
        🕒 <code>{{ now().strftime('%Y-%m-%d %H:%M:%S') }}</code>
        SSID: <code>{{ wifi_ssid }}</code>

        Cert: <code>{{ wifi_client_cert }}</code>
        Enrolment: <code>{{ lookup('file', '/var/log/zc-enroll.status') | regex_search('ENROLLED=(.+)', '\\1') | first | default('unknown') }}</code>

        ℹ️ SSID not in range — cert enrolled and profile installed.
        Will connect automatically when device arrives at the office.
  failed_when: false
  changed_when: false
  when: not wifi_ssid_visible

- name: Report remote enrollment outcome
  debug:
    msg: >-
      SSID '{{ wifi_ssid }}' not in range. Cert enrolled and profile installed.
      Device will connect automatically when it arrives at the office.
  when: not wifi_ssid_visible
