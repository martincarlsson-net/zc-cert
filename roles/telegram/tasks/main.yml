---
# telegram role
# Deploys the shared, robust Telegram sender used by the Wi-Fi connection test
# and by the playbook's failure-notification rescue. Runs first so the sender
# exists before anything that could fail.

- name: Deploy the Telegram sender script
  template:
    src: zc-telegram-send.sh.j2
    dest: "{{ telegram_send_script }}"
    owner: root
    group: root
    mode: "0700"   # contains the bot token — root only

# Create the log file with restricted permissions before anything writes to it.
# Without this, the scripts create it with default umask (0644), which would
# expose API responses containing chat ID and message content to other users.
- name: Allow any user to run the Telegram sender without a password
  ansible.builtin.copy:
    dest: /etc/sudoers.d/zc-telegram-send
    owner: root
    group: root
    mode: "0440"
    content: |
      ALL ALL=(root) NOPASSWD: {{ telegram_send_script }}

- name: Ensure the Telegram log file exists with restricted permissions
  file:
    path: "{{ telegram_send_log }}"
    state: touch
    owner: root
    group: root
    mode: "0600"
    modification_time: preserve
    access_time: preserve
