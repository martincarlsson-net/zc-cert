---
# scep_ca_name, scep_challenge_password, cert_org, and cert_country are
# provided via group_vars/all/vault.yml — set there, not here.

# Where the issued key and certificate are stored on the client.
cert_key_path: "/etc/pki/tls/private/scep-wifi.key"
cert_path: "/etc/pki/tls/certs/scep-wifi.crt"

# Certificate subject. CN is the hostname (unique via product serial).
# OU is the group-derived tag (resolved at runtime in tasks/main.yml).
cert_subject_cn: "{{ ansible_facts['hostname'] }}"
cert_subject: "CN={{ cert_subject_cn }},OU={{ scep_cert_tag }},O={{ cert_org }},C={{ cert_country }}"
