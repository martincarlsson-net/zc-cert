---
# scep_enroll role
# Requests a device certificate from FortiAuthenticator via certmonger and the
# SCEP CA registered by the scep_client role, then waits for it to be issued.

# Determine which user to resolve groups for. Explicit -e cert_user=<name>
# takes priority; falls back to SUDO_USER, then the current user.
- name: Get invoking username
  ansible.builtin.set_fact:
    scep_invoking_user: "{{ cert_user | default(ansible_facts['env'].get('SUDO_USER', ansible_facts['user_id'])) }}"

- name: Get groups for invoking user
  ansible.builtin.shell:
    cmd: "id -G {{ scep_invoking_user }} | tr ' ' '\n' | xargs -I{} getent group {} | cut -d: -f1"
  register: scep_user_groups
  changed_when: false

- name: Resolve cert group tag (first match wins)
  ansible.builtin.set_fact:
    scep_cert_tag: >-
      {{ (cert_group_tags
          | selectattr('group', 'in', scep_user_groups.stdout_lines)
          | map(attribute='tag')
          | list
          | first) }}
  ignore_errors: true
  register: scep_tag_result

- name: Fail if user has no matching cert group
  ansible.builtin.fail:
    msg: >-
      User {{ scep_invoking_user }} is not a member of any group in cert_group_tags.
      Certificate enrollment is only permitted for users in a mapped group.
      Current groups: {{ scep_user_groups.stdout }}
  when: scep_tag_result is failed or scep_cert_tag == ''

- name: Set subject with hostname and machine ID as CN
  ansible.builtin.set_fact:
    cert_subject_cn: "{{ ansible_facts['hostname'] }}-{{ ansible_facts['machine_id'][-6:] }}"
    cert_subject: "CN={{ ansible_facts['hostname'] }}-{{ ansible_facts['machine_id'][-6:] }},OU=Linux,O={{ cert_org }},C={{ cert_country }}"

- name: Show resolved certificate subject
  ansible.builtin.debug:
    msg: "Enrolling certificate: CN={{ ansible_facts['hostname'] }}-{{ ansible_facts['machine_id'][-6:] }}, OU=Linux"

- name: Fail early if no SCEP challenge password was supplied
  assert:
    that: scep_challenge_password | length > 0
    fail_msg: >-
      scep_challenge_password is empty. Ensure group_vars/all/vault.yml is
      present and decrypted (--ask-vault-pass or --vault-password-file).
      You can also override at runtime with -e scep_challenge_password=<password>.

- name: Ensure certificate output directories exist with correct permissions
  file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: /etc/pki/tls/private, mode: "0700" }
    - { path: /etc/pki/tls/certs,   mode: "0755" }

# Idempotency guard: only enrol if certmonger isn't already monitoring the cert.
- name: Check whether certmonger already tracks this certificate
  command: getcert list -f "{{ cert_path }}"
  register: scep_cert_check
  failed_when: false
  changed_when: false

# If a previous enrollment attempt left certmonger in a stuck state
# (CA_UNREACHABLE, CA_REJECTED, etc.) stop tracking before trying again.
# Without this, getcert request fails because the path is already tracked.
- name: Stop tracking a stuck previous enrollment attempt
  command: getcert stop-tracking -f "{{ cert_path }}"
  when:
    - scep_cert_check.rc == 0
    - "'status: MONITORING' not in scep_cert_check.stdout"
  failed_when: false
  changed_when: false

- name: Request the device certificate over SCEP
  command: >
    getcert request
    -c "{{ scep_ca_name }}"
    -k "{{ cert_key_path }}"
    -f "{{ cert_path }}"
    -N "{{ cert_subject }}"
    -L "{{ scep_challenge_password }}"
  when: "'status: MONITORING' not in scep_cert_check.stdout"
  register: scep_cert_request

# certmonger enrols asynchronously; poll until it reaches a terminal state.
# 24 retries × 5s = 120s — more headroom for a loaded FAC in production.
- name: Wait for the certificate to reach a terminal state (up to 120s)
  command: getcert list -f "{{ cert_path }}"
  register: scep_cert_status
  until: >
    'status: MONITORING' in scep_cert_status.stdout or
    'status: CA_REJECTED' in scep_cert_status.stdout or
    'status: CA_UNREACHABLE' in scep_cert_status.stdout
  retries: 24
  delay: 5
  changed_when: false
  when: scep_cert_request is changed

- name: Read the final certificate status
  command: getcert list -f "{{ cert_path }}"
  register: scep_cert_final
  changed_when: false

- name: Show certificate status
  debug:
    msg: "{{ scep_cert_final.stdout_lines }}"

- name: Fail if the certificate did not reach MONITORING
  assert:
    that: "'status: MONITORING' in scep_cert_final.stdout"
    fail_msg: "SCEP enrolment did not reach MONITORING — see the status above."

# Write a summary consumed by the wifi_profile test script to populate the
# Telegram message with cert details (new vs existing, CN, expiry, issuer).
- name: Write enrolment summary for Telegram notification
  copy:
    dest: /var/log/zc-enroll.status
    mode: "0600"
    content: |
      ENROLLED={{ 'NEW' if (scep_cert_request is defined and scep_cert_request is changed) else 'EXISTING' }}
      SUBJECT={{ scep_cert_final.stdout | regex_search('subject:\s+(.+)', '\1') | first | default('unknown') }}
      EXPIRES={{ scep_cert_final.stdout | regex_search('expires:\s+(.+)', '\1') | first | default('unknown') }}
      ISSUER={{ scep_cert_final.stdout | regex_search('issuer:\s+(.+)', '\1') | first | default('unknown') }}
