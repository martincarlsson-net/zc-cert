[defaults]
# Look for roles relative to the repo root, not the playbook directory.
roles_path = roles
inventory  = inventory/hosts
vault_password_file = /etc/ansible/.vault-pass
# Write a persistent run log so you can follow progress with: tail -f /var/log/ansible.log
log_path = /var/log/ansible.log
# Human-readable task output (shows ok/changed/failed per task as it runs).
stdout_callback = yaml
