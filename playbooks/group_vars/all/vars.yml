---
# Non-sensitive defaults shared by all linux_clients.
# Org-specific and sensitive values (SCEP URL, CA names, challenge password,
# Wi-Fi SSID, certificate subject, Telegram credentials) live in vault.yml.

# Connection-test tuning — adjust if your network is slow to associate.
wifi_connect_timeout: 30   # seconds to wait for the cert connection to activate
wifi_failsafe_delay: 120   # seconds until the failsafe forces the fallback Wi-Fi back

# Internet reachability check after associating to the cert SSID.
wifi_ping_target: "8.8.8.8"
wifi_ping_count: 3
wifi_internet_restore_wait: 30   # 2s steps to wait for internet on fallback

# PMF (Protected Management Frames): 2 = optional, compatible with WPA2 and WPA3.
wifi_pmf: 2

# State files written by the connection test and enrolment roles. Defined here
# (not only in role defaults) so the playbook-level reset task can reference
# wifi_test_status before any role has been loaded.
# Certificate subject — OU=Linux differentiates this profile from the Intune
# enrollment profile on FAC, allowing both to coexist under the same issuing CA.
cert_subject: "CN={{ cert_subject_cn }},OU=Linux,O={{ cert_org }},C={{ cert_country }}"

wifi_test_status: "/var/log/wifi-cert-test.status"
wifi_test_log:    "/var/log/wifi-cert-test.log"

# ---------------------------------------------------------------------------
# Workstation setup (himmelblau.yml / system_root.yml / system_user.yml).
# These values are organisation-specific and MUST be provided by vault.yml —
# they are intentionally NOT defined here so nothing identifying is committed
# to this public repo:
#
#   entra_domains:     # list, e.g. ["example.com"] — primary Entra ID domain(s)
#   hostname_prefix:   # site/org code prefixed to the product serial as hostname
#   opkssh_tenant_id:  # Azure tenant (GUID) for the OPKSSH OIDC issuer
#   opkssh_client_id:  # Azure app client ID (GUID) for OPKSSH
# ---------------------------------------------------------------------------

# Maps group tag (from cert_group_tags in vault) to the Wi-Fi profile to deploy.
# First match in cert_group_tags wins; that tag is looked up here to get the
# SSID and NM connection name. Add a new entry for each additional group/SSID.
# wifi_profile_map is defined in vault.yml (org-specific SSID names and
# connection names belong there, not in this public file).
# Expected structure:
#   wifi_profile_map:
#     <tag>:
#       ssid: "Your SSID Name"
#       con_name: "your_connection_name"

# Telegram notification (sender script shared by the test and the rescue block).
# Credentials (telegram_bot_token, telegram_chat_id) come from vault.yml.
telegram_send_script: "/usr/local/sbin/zc-telegram-send.sh"
telegram_send_log: "/var/log/zc-telegram.log"
telegram_ping_target: "8.8.8.8"
# Wait times (seconds) BEFORE each send attempt; first is immediate. Delivery is
# only counted on an "ok":true response. Default: now, +30s, +60s, +60s, +120s.
telegram_backoffs: "0 30 60 60 120"
