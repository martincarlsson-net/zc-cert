---
# Installs certmonger, enrols a device certificate from FortiAuthenticator via
# SCEP, then deploys an 802.1X/EAP-TLS Wi-Fi profile that uses that certificate.
#
# Designed for ansible-pull: run directly on the enrolling Fedora client:
#   sudo ansible-pull -U https://github.com/martincarlsson-net/zc-cert.git \
#     -i inventory/hosts playbooks/scep_enroll.yml --ask-vault-pass
#
# Secrets (SCEP URL, CA names, challenge password, org details, Wi-Fi SSID) are
# stored in group_vars/all/vault.yml, encrypted with ansible-vault. 
- name: SCEP certificate enrolment and EAP-TLS Wi-Fi profile deployment
  hosts: wifi_clients
  become: true
  roles:
    - scep_client   # install certmonger, deploy CA trust, register the SCEP CA
    - scep_enroll   # request the device certificate and wait for issuance
    - wifi_profile  # deploy the EAP-TLS Wi-Fi profile, test + automatic rollback
