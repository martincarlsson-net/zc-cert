---
# Installs certmonger, enrols a device certificate from FortiAuthenticator via
# SCEP, then deploys an 802.1X/EAP-TLS Wi-Fi profile that uses that certificate.
#
# Designed for ansible-pull: run directly on the enrolling Fedora client:
#   sudo ansible-pull -U https://github.com/martincarlsson-net/zc-cert.git \
#     playbooks/scep_enroll.yml --ask-vault-pass
#
# Secrets (SCEP URL, CA names, challenge password, org details, Wi-Fi SSID,
# Telegram credentials) are stored in group_vars/all/vault.yml (ansible-vault).
- name: SCEP certificate enrolment and EAP-TLS Wi-Fi profile deployment
  hosts: linux_clients
  become: true
  tasks:
    # Reset the test status at the very start so a stale value from a previous
    # run never causes the wait task to exit early if this run fails before
    # wifi_profile gets a chance to reset it itself.
    - name: Reset the connection-test status marker
      copy:
        dest: "{{ wifi_test_status }}"
        content: "PENDING\n"
        owner: root
        group: root
        mode: "0644"
      failed_when: false

    # Wrap everything in a block so any failure is caught by the rescue.
    - block:
        - include_role:
            name: telegram      # deploy the shared Telegram sender (used below + by the test)

        - include_role:
            name: scep_client   # install certmonger, deploy CA trust, register the SCEP CA

        - include_role:
            name: scep_enroll   # request the device certificate and wait for issuance

        - include_role:
            name: wifi_profile  # deploy the EAP-TLS Wi-Fi profile, test + automatic rollback

      rescue:
        # Alert via the shared sender (DoH + --resolve + retry + ok:true), so the
        # failure notification gets through despite the network filtering Telegram
        # on plain DNS — the Ansible uri module could not. failed_when: false keeps
        # the notification from masking the real error. The message is passed as a
        # single argv element so its newlines and HTML are preserved.
        - name: Send Telegram failure notification
          command:
            argv:
              - "{{ telegram_send_script }}"
              - |-
                ❌ <b>Cert enrolment failed</b>
                Host: <code>{{ ansible_facts['hostname'] }}</code>
                <code>{{ now().strftime('%Y-%m-%d %H:%M:%S') }}</code>

                Task: {{ ansible_failed_task.name | replace('<', '&lt;') | replace('>', '&gt;') }}
                Error: {{ (ansible_failed_result.msg | default('unknown')) | replace('<', '&lt;') | replace('>', '&gt;') }}
          failed_when: false
          changed_when: false

        # Re-raise so the run still exits non-zero and ansible-pull reports failure.
        - name: Re-raise the original failure
          fail:
            msg: >-
              {{ ansible_failed_task.name }}: {{ ansible_failed_result.msg | default('see above') }}

